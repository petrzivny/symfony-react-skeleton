on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string

jobs:
  nginx:
    runs-on: self-hosted
    steps:
      - name: Debug
        run: |
          echo ${{ inputs.image-name }}
          node -v

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          # Keep this aligned with `fe/package.json#engines.node`
          node-version: '24.11.1'

      - name: Activate pnpm for this Node
        run: |
          set -e
          node -v
          command -v corepack && corepack enable || true
          # Use packageManager's pnpm version to avoid mismatches.
          if command -v corepack; then
            corepack prepare pnpm@9.15.4 --activate
          else
            npm i -g pnpm@9.15.4
          fi
          echo "node: $(which node)"
          echo "pnpm: $(which pnpm)"
          pnpm -v

      - run: pnpm install --frozen-lockfile
        working-directory: fe

      - run: pnpm run build
        working-directory: fe

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and load to local docker images - nginx
        uses: docker/build-push-action@v3
        with:
          context: .
          file: .docker/nginx/Dockerfile
          target: deployment
          tags: ${{ inputs.image-name }}/nginx
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,mode=max,dest=/tmp/.buildx-cache

